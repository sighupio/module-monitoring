# Source: x509-certificate-exporter/templates/prometheusrule.yaml
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: x509-certificate-exporter
  namespace: monitoring
  labels:
    app: x509-certificate-exporter
    prometheus: k8s
    role: alert-rules
spec:
  groups:
    - name: x509-certificate-exporter.rules
      rules:
        - alert: 'CertificateError'
          expr: x509_cert_error > 0
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Certificate cannot be decoded
            description: Certificate could not be decoded {{if $labels.secret_name }}in Kubernetes secret "{{ $labels.secret_namespace }}/{{ $labels.secret_name }}"{{else}}at location "{{ $labels.filepath }}"{{end}}
        - alert: 'CertificateRenewal'
          expr: (x509_cert_not_after - time()) < (28 * 86400)
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Certificate should be renewed
            description: Certificate for "{{ $labels.subject_CN }}" should be renewed as it expires in {{ humanizeDuration $value }} {{if $labels.secret_name }}in Kubernetes secret "{{ $labels.secret_namespace }}/{{ $labels.secret_name }}"{{else}}at location "{{ $labels.filepath }}"{{end}}
        - alert: 'CertificateExpiration'
          expr: (x509_cert_not_after - time()) < (14 * 86400)
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: Certificate is about to expire
            description: Certificate for "{{ $labels.subject_CN }}" is about to expire in {{ humanizeDuration $value }} {{if $labels.secret_name }}in Kubernetes secret "{{ $labels.secret_namespace }}/{{ $labels.secret_name }}"{{else}}at location "{{ $labels.filepath }}"{{end}}
        - alert: 'SourceErrors'
          expr: "sum without (reason) (increase(x509_source_errors_total[15m])) > 5"
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: x509-certificate-exporter source is producing errors
            description: Source `{{ $labels.source_name }}` (kind `{{ $labels.source_kind }}`) recorded more than 5 errors over the last 15 minutes. This covers both bundle-level failures (parse errors on PEM/PKCS#12/JKS/DER, missing certs, bad passphrase) and transport-level failures from the Kubernetes API. Inspect `x509_source_errors_total` broken down by `reason` for the specific cause.
        - alert: 'SourceErrorsSustained'
          expr: "sum without (reason) (increase(x509_source_errors_total[15m])) > 5"
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: x509-certificate-exporter source has been producing errors for 30+ minutes
            description: Source `{{ $labels.source_name }}` has had a sustained error rate (>5 events per 15min, continuously for 30 minutes). This is no longer a transient state — investigate the breakdown of `x509_source_errors_total` by reason to find the root cause.
