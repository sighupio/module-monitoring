---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

generatorOptions:
  labels:
    grafana-sighup-dashboard: default
  annotations:
    grafana-folder: "Monitoring"
  disableNameSuffixHash: true

# Split into two ConfigMaps because the total size of all dashboard JSON files
# exceeds the 1 MiB Kubernetes ConfigMap limit.
configMapGenerator:
  - name: mimir-dashboards-core
    files:
      - mimir-config.json
      - mimir-queries.json
      - mimir-reads.json
      # Disabled, no data with our setup
      #- mimir-reads-networking.json
      - mimir-tenants.json
      - mimir-writes.json
      # Disabled, no data with our setup
      #- mimir-writes-networking.json
  - name: mimir-dashboards-resources
    files:
      - mimir-compactor.json
      - mimir-compactor-resources.json
      - mimir-object-store.json
      - mimir-reads-resources.json
      - mimir-writes-resources.json
      # Disabled, no scaling in our setup
      #- mimir-scaling.json
