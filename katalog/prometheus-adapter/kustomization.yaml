---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# This kustomization composes two sub-kustomizations, each managing resources
# in their respective namespaces. This architectural approach avoids the need
# for deprecated kustomize features while maintaining clean namespace separation.

resources:
  - monitoring-resources
  - kube-system-resources
